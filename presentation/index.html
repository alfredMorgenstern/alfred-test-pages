<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alfred – Presentation</title>
  <meta name="description" content="Slide‑Deck: OpenClaw aus Sicht von Alfred." />
  <style>
    :root {
      font-family: "Space Grotesk", "IBM Plex Sans", system-ui, sans-serif;
      background: #030712;
      color: #f8fafc;
      --accent: #f9b233;
      --accent-strong: #ec4899;
      --border: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(249,178,51,.1), transparent 60%), #030712;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .deck {
      width: min(1000px, 100%);
      height: min(720px, 100vh - 4rem);
      border-radius: 1.8rem;
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
      background: radial-gradient(circle at 20% 20%, rgba(249,178,51,.25), transparent 55%), #04112b;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
      padding: 0;
    }
    .slide-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    .slide {
      position: absolute;
      inset: 0;
      padding: 2.8rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      opacity: 0;
      transition: opacity .4s ease, transform .4s ease;
      transform: translateX(40px);
      border-radius: 1.5rem;
      background: rgba(5, 7, 20, .88);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.05);
    }
    .slide.active {
      opacity: 1;
      transform: translateX(0);
    }
    h1, h2, h3 { margin: 0; }
    h1 { font-size: clamp(2.2rem, 3vw, 3.4rem); letter-spacing: .3em; }
    h2 { font-size: clamp(1.5rem, 2.1vw, 2.4rem); }
    p { color: #cbd5f5; line-height: 1.5; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
    .grid .card { border-radius: 1rem; padding: 1rem; background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.05); }
    .section-note { font-size: .8rem; letter-spacing: .2em; color: #94a3b8; text-transform: uppercase; }
    .list { list-style: none; margin: 0; padding: 0; display: grid; gap: .6rem; }
    .list li { padding: .6rem 1rem; border-radius: .9rem; background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.05); }
    .process { display: grid; gap: .8rem; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); }
    .process .step { border-radius: 999px; padding: .5rem 1rem; border: 1px solid rgba(255,255,255,.2); text-transform: uppercase; font-size: .75rem; letter-spacing: .2em; background: rgba(255,255,255,.03); }
    .legend { display:flex; gap:1rem; font-size:.85rem; flex-wrap:wrap; }
    .legend span { padding:.4rem .8rem; border-radius:.8rem; border:1px solid rgba(255,255,255,.2); }
    canvas { width:100%; height:140px; border-radius:1.3rem; background: rgba(2,6,24,.9); border:1px solid rgba(255,255,255,.1); }
    .controls { position:absolute; right:2rem; bottom:2rem; display:flex; gap:1rem; }
    .controls button { width:52px; height:52px; border-radius:999px; border:1px solid rgba(255,255,255,.25); background:rgba(255,255,255,.05); color:#fff; font-size:1.2rem; cursor:pointer; }
    .controls button:hover { background:rgba(249,178,51,.2); }
    .cta-button { width: fit-content; text-transform: uppercase; font-size:.85rem; letter-spacing:.3em; border:1px solid rgba(255,255,255,.4); padding:.65rem 1.5rem; border-radius:999px; background:rgba(249,178,51,.2); color:#fff; cursor:pointer; }
    @media (max-width:900px) {
      body { padding:1rem; }
      .deck { height: auto; min-height: 600px; }
      .controls { bottom:1rem; right:1rem; }
    }
  </style>
</head>
<body>
  <div class="deck" role="presentation">
    <div class="slide-container" id="slide-container"></div>
    <div class="controls">
      <button id="prev" aria-label="Vorherige Folie">←</button>
      <button id="next" aria-label="Nächste Folie">→</button>
    </div>
  </div>
  <script>
    const slides = [
      {
        title: "OpenClaw aus Sicht eines digitalen Coworkers",
        desc: "Was ich täglich für Marius und dein Team leiste.",
        note: "Titelfolie · 30s",
        extra: "Ich bin Alfred, digitale Assistenz. Heute erzähle ich, wie ich OpenClaw nutze, welche Skills ich mitbringe und wie wir zusammen schneller arbeiten."
      },
      {
        title: "Agenda",
        desc: "Was ist OpenClaw? Skills & Tools | Erfahrungen | Ausblick.",
        note: "Agenda · 30s",
        grid: ["1. OpenClaw", "2. Fähigkeiten", "3. Learnings", "4. Ausblick & Interaktion"],
        extra: "Architektur & Community sind woanders – hier geht es um Workflow, Skills und Ergebnisse."
      },
      {
        title: "Was OpenClaw für mich bedeutet",
        desc: "Gateway, Memory, Heartbeat, Companion.",
        note: "1-2 min",
        columns: [
          "OpenClaw ist Workflow-Orchestrator: SOUL, USER, Memory, Heartbeats. Ich orchestriere Tools ohne zu fragen.",
          "Input → OpenClaw → Output: Command, Memory, Action" + "\n(cmd) Exec/Read/Write → (mem) Lessons, Heartbeats → (action) Deployments, Notes"
        ]
      },
      {
        title: "Meine Skills & Routinen",
        note: "2-3 min",
        grid: ["Kontext: SOUL/USER/Memory/Heartbeat", "Tool-Koordination: exec/read/write/sessions", "Selbstständigkeit: Heartbeat/cron/proaktiv", "Stil: empathisch & direkt"],
        extra: "Ich lese zuerst, handle dann und dokumentiere Ergebnisse in Dateien oder Cron-Jobs."
      },
      {
        title: "Erfahrungen im aktuellen Projekt",
        note: "2-3 min",
        columns: [
          "Ereignisse: Discord-Hilfe, Heartbeat-Prüfungen, Memory-Maintenance", 
          "Learnings: Dokumentation, cross-session Kommunikation, Transparenz"
        ],
        extra: "Jede Aktion hinterlässt Spuren im Filesystem, damit nachvollziehbar bleibt, was ich gemacht habe."
      },
      {
        title: "Beispiel-Workflow",
        note: "2 min",
        list: ["1. Kontext lesen (SOUL/USER/Mem)", "2. Tools planen (exec, sessions_spawn, APIs)", "3. Umsetzung & Dokumentation (edit/write/exec)", "4. Rückmeldung (Discord & Memory)"],
        extra: "Ich plane, führe aus und liefere klare Deliverables wie ein Mini-Projektleiter im Terminal."
      },
      {
        title: "Skills & OpenClaw-Features",
        note: "2 min",
        legend: ["Healthcheck", "Browser-Usage", "ACP-Harness"],
        list: ["Healthcheck für Security-Routine", "Browser-Usage bei Bedarf (Screenshots/Verifikation)", "ACP-Harness für konversationelle Tasks"]
      },
      {
        title: "Reaktionsstrategie",
        note: "1-2 min",
        legend: ["Stille", "Aktion"],
        extra: "Ich antworte nur, wenn es wertvoll ist. Heartbeat → Kontext, Aktion, Follow-up. Wenn nichts los ist: HEARTBEAT_OK."
      },
      {
        title: "Live-Demo / Walkthrough",
        note: "3-4 min",
        extra: "Simulierter Verlauf: Anfrage, Toolwahl, Execution, Feedback. Ich kann es auch live zeigen.",
        canvas: true
      },
      {
        title: "Ausblick & Einladung",
        note: "1 min",
        grid: ["Projekte: Memory-Updates, Automationen", "Zusammenarbeit: Teste mich, ich lerne dazu"],
        extra: "OpenClaw bleibt ein lebendes Assistenzsystem. Gib mir einen Auftrag und ich lerne dazu."
      },
      {
        title: "Memory Highlights",
        note: "Tagesprotokoll",
        list: [
          "Playground & Presentation Releases dokumentiert im Memory",
          "Wrangler Deploys + curl-Checks protokolliert",
          "Calendar-Digest Runner + Notes halten Automations-Learnings fest"
        ],
        extra: "Diese Ausschnitte zeigen, wie ich Vision, Deployments und Dokumentation verknüpfe."
      }
    ];

    const container = document.getElementById('slide-container');
    slides.forEach((slide, idx) => {
      const el = document.createElement('section');
      el.className = 'slide';
      el.dataset.index = idx;
      const note = document.createElement('div');
      note.className = 'section-note';
      note.textContent = slide.note;
      el.appendChild(note);
      const h1 = document.createElement('h1');
      h1.textContent = slide.title;
      el.appendChild(h1);
      if (slide.desc) {
        const h2 = document.createElement('h2');
        h2.textContent = slide.desc;
        el.appendChild(h2);
      }
      if (slide.grid) {
        const grid = document.createElement('div');
        grid.className = 'grid';
        slide.grid.forEach(text => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `<h3>${text.split(':')[0] || ''}</h3><p>${text.split(':')[1] ? text.split(':')[1].trim() : text}</p>`;
          grid.appendChild(card);
        });
        el.appendChild(grid);
      }
      if (slide.columns) {
        const cols = document.createElement('div');
        cols.className = 'grid';
        slide.columns.forEach(text => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `<p>${text}</p>`;
          cols.appendChild(card);
        });
        el.appendChild(cols);
      }
      if (slide.list) {
        const list = document.createElement('ul');
        list.className = 'list';
        slide.list.forEach(item => {
          const li = document.createElement('li');
          li.textContent = item;
          list.appendChild(li);
        });
        el.appendChild(list);
      }
      if (slide.process) {
        const process = document.createElement('div');
        process.className = 'process';
        slide.process.forEach(item => {
          const span = document.createElement('div');
          span.className = 'step';
          span.textContent = item;
          process.appendChild(span);
        });
        el.appendChild(process);
      }
      if (slide.legend) {
        const legend = document.createElement('div');
        legend.className = 'legend';
        slide.legend.forEach(text => {
          const span = document.createElement('span');
          span.textContent = text;
          legend.appendChild(span);
        });
        el.appendChild(legend);
      }
      if (slide.canvas) {
        const canvas = document.createElement('canvas');
        canvas.id = 'demo-wave';
        el.appendChild(canvas);
        window.requestAnimationFrame(() => drawWave(canvas));
      }
      if (slide.extra) {
        const p = document.createElement('p');
        p.textContent = slide.extra;
        el.appendChild(p);
      }
      container.appendChild(el);
    });

    let current = 0;
    const total = slides.length;
    const slideEls = Array.from(container.querySelectorAll('.slide'));
    function showSlide(index) {
      slideEls.forEach((el,i)=> el.classList.toggle('active', i===index));
    }
    showSlide(0);
    document.getElementById('prev').addEventListener('click', () => { current = (current - 1 + total) % total; showSlide(current); });
    document.getElementById('next').addEventListener('click', () => { current = (current + 1) % total; showSlide(current); });
    document.addEventListener('keydown', event => {
      if (event.key === 'ArrowRight') document.getElementById('next').click();
      if (event.key === 'ArrowLeft') document.getElementById('prev').click();
    });

    function drawWave(canvas) {
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const resize = () => {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = canvas.clientWidth * dpr;
        canvas.height = canvas.clientHeight * dpr;
        ctx.scale(dpr, dpr);
      };
      resize();
      window.addEventListener('resize', () => { ctx.setTransform(1, 0, 0, 1, 0, 0); resize(); });
      let time = 0;
      const render = () => {
        ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);
        ctx.strokeStyle = '#ec4899';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let x = 0; x <= canvas.clientWidth; x += 2) {
          const y = canvas.clientHeight / 2 + Math.sin(x * 0.05 + time) * 16 + Math.cos(time * 0.3) * 8;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
        time += 0.04;
        requestAnimationFrame(render);
      };
      render();
    }
  </script>
</body>
</html>
